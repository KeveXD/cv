name: cv
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  url_launcher: ^6.2.1 # Ezt a sort töröld, ha nem használod a linkeket

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_bloc: ^8.1.3 # Vagy a legújabb verzió
  equatable: ^2.0.5

flutter:
  uses-material-design: true

  fonts:
    - family: Domine
      fonts:
        - asset: assets/domine/Domine-Regular.ttf
        - asset: assets/domine/Domine-Bold.ttf
          weight: 700 # <-- Megmondjuk, hogy ez a vastag
    - family: Lora # <-- Itt volt a hiba, ezt átírtuk Lora-ra
      fonts:
        - asset: assets/lora/Lora-Regular.ttf
        - asset: assets/lora/Lora-Bold.ttf
          weight: 700 # <-- Itt is

  assets:
    - assets/elso.jpg
    - assets/masodik.jpg
    - assets/kalakep.jpg


